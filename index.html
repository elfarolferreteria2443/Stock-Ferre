function iniciarSiguienteDelLote(){
  if(!loteActivo) return;
  if(loteIndex >= loteArchivos.length){
    const cantidad = loteArchivos.length;
    loteActivo = false;
    loteArchivos = [];
    loteIndex = 0;
    closeModal();
    currentTab = 'stock';
    render();
    showToast(`Listo: se procesaron ${cantidad} archivo(s).`);
    return;
  }
  const file = loteArchivos[loteIndex];
  const nombreArchivo = normTxt(file.name.replace(/\.(xlsx|xls|csv|xlsm)$/i, ''));
  const sugeridos = proveedores.filter(pr => {
    const n = normTxt(pr.nombre);
    return n && (nombreArchivo.includes(n) || n.includes(nombreArchivo));
  });
  if(sugeridos.length === 1){
    abrirImportLoteParaProveedor(sugeridos[0].id, file);
  }else{
    mostrarSelectorProveedorLote(file, sugeridos);
  }
}

function mostrarSelectorProveedorLote(file, sugeridos){
  window.__loteFileTemp = file;
  const modal = document.getElementById('modalRoot');
  modal.innerHTML = `
  <div class="overlay">
    <div class="modal">
      <h3>¿A qué proveedor corresponde?</h3>
      <div class="subtitle">Archivo ${loteIndex+1} de ${loteArchivos.length}: ${esc(file.name)}</div>
      <div class="field"><label>Proveedor</label>
        <select id="lote_proveedor_sel">
          <option value="">— Elegir —</option>
          ${proveedores.map(pr=>`<option value="${pr.id}" ${sugeridos.length===1 && sugeridos[0].id===pr.id ? 'selected':''}>${esc(pr.nombre)}</option>`).join('')}
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" onclick="cancelarLote()">Cancelar todo el lote</button>
        <button class="btn secondary" onclick="saltarArchivoLote()">Saltar este archivo</button>
        <button class="btn" onclick="confirmarProveedorLote()">Continuar</button>
      </div>
    </div>
  </div>`;
}

function confirmarProveedorLote(){
  const id = document.getElementById('lote_proveedor_sel').value;
  if(!id){ showToast('Elegí un proveedor'); return; }
  abrirImportLoteParaProveedor(id, window.__loteFileTemp);
}

function abrirImportLoteParaProveedor(proveedorId, file){
  openImportModal(proveedorId);
  cargarArchivoEnContexto(file);
}

function saltarArchivoLote(){
  loteIndex++;
  iniciarSiguienteDelLote();
}

function cancelarLote(){
  loteActivo = false;
  loteArchivos = [];
  loteIndex = 0;
  closeModal();
  render();
  showToast('Lote de importación cancelado');
}

/* Compara la configuración guardada de un proveedor contra el archivo recién subido */
function detectarCambios(config, allRows){
  const avisos = [];
  const maxCols = allRows.reduce((m,r)=>Math.max(m, r.length), 1);
  if(config.maxColsSeen && maxCols !== config.maxColsSeen){
    avisos.push(`Antes el archivo tenía ${config.maxColsSeen} columna(s) y ahora tiene ${maxCols}.`);
  }
  const sample = allRows.slice(config.startRow-1, config.startRow-1+15).filter(r=>r.some(c=>String(c).trim()!==''));
  if(sample.length){
    let numOk=0, numTotal=0;
    for(const r of sample){
      const v = r[config.colPrecio];
      if(v===undefined || v==='') continue;
      numTotal++;
      if(!isNaN(parsePrecioAR(v))) numOk++;
    }
    if(numTotal>0 && (numOk/numTotal) < 0.6){
      avisos.push(`La columna ${excelCol(config.colPrecio)} (Precio) ya no parece tener precios.`);
    }
    let txtOk=0, txtTotal=0;
    for(const r of sample){
      const v = r[config.colDescripcion];
      if(v===undefined || v==='') continue;
      txtTotal++;
      if(isNaN(parsePrecioAR(v)) && String(v).trim().length>=3) txtOk++;
    }
    if(txtTotal>0 && (txtOk/txtTotal) < 0.6){
      avisos.push(`La columna ${excelCol(config.colDescripcion)} (Descripción) ya no parece tener nombres de productos.`);
    }
  }
  return avisos;
}

function renderImportMapping(){
  const div = document.getElementById('im_mapping');
  const rows = importCtx.allRows;
  const startRow = importCtx.startRow || 1;
  const fileMaxCols = rows.reduce((m,r)=>Math.max(m, r.length), 1);
  const maxCols = Math.min(fileMaxCols, IMPORT_LETTERS.length);
  const pr = proveedores.find(x=>x.id===importCtx.proveedorId);
  const config = pr ? pr.importConfig : null;

  // Vista previa tipo Excel, con letras y número de columna (A a L como máximo) — 5 filas visibles
  const windowSize = 5;
  let windowStart = Math.max(0, (startRow - 1) - Math.floor(windowSize/2));
  windowStart = Math.min(windowStart, Math.max(0, rows.length - windowSize));
  windowStart = Math.max(0, windowStart);
  const windowEnd = Math.min(rows.length, windowStart + windowSize);

  let grid = `<div class="file-grid-wrap"><table class="file-grid"><thead><tr><th>Fila</th>`;
  for(let c=0;c<maxCols;c++){ grid += `<th>${excelCol(c)}<br><span style="font-weight:400; opacity:.55;">col. ${c+1}</span></th>`; }
  grid += `</tr></thead><tbody>`;
  for(let r=windowStart; r<windowEnd; r++){
    const rowNum = r+1;
    const isStart = rowNum === startRow;
    grid += `<tr style="${isStart?'background:#fbecd0;':''}"><td class="mono">${rowNum}${isStart?' ▶':''}</td>`;
    for(let c=0;c<maxCols;c++){
      let val = rows[r][c] ?? '';
      val = String(val);
      if(val.length>20) val = val.slice(0,20)+'…';
      grid += `<td>${esc(val)}</td>`;
    }
    grid += `</tr>`;
  }
  grid += `</tbody></table></div>`;

  const colOpts = (allowNone) => {
    let h = allowNone ? '<option value="">— No tiene —</option>' : '';
    for(let c=0;c<maxCols;c++){ h += `<option value="${c}">Columna ${excelCol(c)}</option>`; }
    return h;
  };

  let avisosHtml = '';
  if(config){
    const avisos = detectarCambios(config, rows);
    if(avisos.length){
      avisosHtml = `<div style="background:var(--warn-bg); color:var(--warn); border-radius:8px; padding:10px 12px; margin-bottom:10px; font-size:12.5px;">
        <b>⚠ Este archivo parece distinto al de la última vez:</b>
        <ul style="margin:6px 0 0 18px; padding:0;">${avisos.map(a=>`<li>${esc(a)}</li>`).join('')}</ul>
      </div>`;
    }else{
      avisosHtml = `<div style="color:var(--ink-soft); font-size:12px; margin-bottom:10px;">Se precargó la config. de la última importación (${config.savedAt}).</div>`;
    }
  }

  const sheetNames = importCtx.workbook ? importCtx.workbook.SheetNames : [];
  const sheetSelector = sheetNames.length > 1 ? `
    <div class="field">
      <label>Hoja del Excel</label>
      <select onchange="changeImportSheet(this.value)">
        ${sheetNames.map(n=>`<option value="${esc(n)}" ${n===importCtx.sheetName?'selected':''}>${esc(n)}</option>`).join('')}
      </select>
    </div>` : '';

  div.innerHTML = `
    <div class="import-layout">
      <div class="import-col-left">
        <div class="step-label">Así se ve tu archivo (como en Excel)</div>
        ${grid}
        <div id="im_preview"></div>
      </div>
      <div class="import-col-right">
        ${sheetSelector}
        <div class="field">
          <label>¿En qué fila empiezan los productos?</label>
          <input id="im_start_row" type="number" min="1" value="${startRow}" onchange="importCtx.startRow=Math.max(1,Math.round(Number(this.value)||1)); renderImportMapping();">
        </div>
        ${avisosHtml}
        <div class="field"><label>Código</label><select id="im_col_codigo">${colOpts(true)}</select></div>
        <div class="field"><label>Rubro</label><select id="im_col_rubro">${colOpts(true)}</select></div>
        <div class="field"><label>Descripción *</label><select id="im_col_descripcion">${colOpts(false)}</select></div>
        <div class="field"><label>Precio *</label><select id="im_col_precio">${colOpts(false)}</select></div>
        <div class="field"><label>UM</label><select id="im_col_um">${colOpts(true)}</select></div>
        <div class="checkbox-field">
          <input type="checkbox" id="im_ya_descuento">
          <label for="im_ya_descuento" style="margin:0;">El precio ya tiene mi descuento aplicado</label>
        </div>
        <button class="btn small" style="width:100%;" onclick="generarPreviewImport()">Generar vista previa</button>
      </div>
    </div>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="btn secondary small" onclick="closeModal()">Cancelar</button>
    </div>
  `;

  if(config){
    // Precargar con la configuración guardada de este proveedor
    setSelectVal('im_col_codigo', config.colCodigo);
    setSelectVal('im_col_rubro', config.colRubro);
    setSelectVal('im_col_descripcion', config.colDescripcion);
    setSelectVal('im_col_precio', config.colPrecio);
    setSelectVal('im_col_um', config.colUM);
    document.getElementById('im_ya_descuento').checked = !!config.yaDescuento;
  }else{
    // Primera vez: adivinar columnas mirando el contenido
    const sample = rows.slice(startRow-1, startRow-1+15);
    let bestPrecio = 0, bestPrecioScore = -1, bestDesc = 0, bestDescScore = -1;
    for(let c=0;c<maxCols;c++){
      let numCount = 0, textLen = 0, textCount = 0;
      for(const r of sample){
        const v = r[c];
        if(v === undefined || v === '') continue;
        if(!isNaN(parsePrecioAR(v)) && String(v).replace(/[^0-9]/g,'').length>0) numCount++;
        else { textLen += String(v).length; textCount++; }
      }
      if(numCount > bestPrecioScore){ bestPrecioScore = numCount; bestPrecio = c; }
      const avgLen = textCount ? textLen/textCount : 0;
      if(avgLen > bestDescScore){ bestDescScore = avgLen; bestDesc = c; }
    }
    document.getElementById('im_col_precio').value = bestPrecio;
    document.getElementById('im_col_descripcion').value = bestDesc === bestPrecio && maxCols>1 ? (bestDesc===0?1:0) : bestDesc;
  }
}

function setSelectVal(id, val){
  const el = document.getElementById(id);
  if(!el) return;
  el.value = (val === null || val === undefined) ? '' : String(val);
}

function normTxt(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); }

function generarPreviewImport(){
  const getCol = (id) => { const v = document.getElementById(id).value; return v === '' ? null : Number(v); };
  const colCodigo = getCol('im_col_codigo');
  const colRubro = getCol('im_col_rubro');
  const colDescripcion = getCol('im_col_descripcion');
  const colPrecio = getCol('im_col_precio');
  const colUM = getCol('im_col_um');
  const yaDescuento = document.getElementById('im_ya_descuento').checked;
  const startRow = importCtx.startRow || 1;

  if(colDescripcion === null || colPrecio === null){ showToast('Elegí al menos la columna de Descripción y de Precio'); return; }

  const dataRows = importCtx.allRows.slice(startRow-1).filter(r => r.some(c=>String(c).trim()!==''));
  if(dataRows.length === 0){ showToast('No hay filas de datos a partir de esa fila'); return; }

  const pr = proveedores.find(x=>x.id===importCtx.proveedorId);
  const rows = dataRows.map(r=>{
    const nombre = String(r[colDescripcion] ?? '').trim();
    const codigo = colCodigo !== null ? String(r[colCodigo] ?? '').trim() : '';
    const rubro = colRubro !== null ? String(r[colRubro] ?? '').trim() : '';
    const um = colUM !== null ? String(r[colUM] ?? '').trim() : '';
    const precioParsed = parsePrecioAR(r[colPrecio]);
    let match = null;
    if(codigo){ match = productos.find(p => p.codigo && normTxt(p.codigo) === normTxt(codigo)); }
    if(!match && nombre){ match = productos.find(p => normTxt(p.nombre) === normTxt(nombre)); }
    const costoNeto = isNaN(precioParsed) ? 0 : (yaDescuento ? precioParsed : aplicarDescuentos(precioParsed, getDescuentos(pr)));
    const venta = redondearPrecio(aplicarGlobales(aplicarGanancias(costoNeto, getGanancias(pr))));
    return { nombre, codigo, rubro, um, precioParsed, costoNeto, venta, match, incluir: !isNaN(precioParsed) && nombre !== '' };
  }).filter(r => r.nombre !== '');

  if(rows.length === 0){ showToast('No se encontraron productos con esas columnas. Revisá la fila de inicio y las columnas elegidas.'); return; }

  importCtx.rows = rows;
  importCtx.mapping = { startRow, colCodigo, colRubro, colDescripcion, colPrecio, colUM, yaDescuento,
    maxColsSeen: importCtx.allRows.reduce((m,r)=>Math.max(m, r.length), 1) };
  renderImportPreview();
}

function renderImportPreview(){
  const div = document.getElementById('im_preview');
  const rows = importCtx.rows;
  const nuevos = rows.filter(r=>!r.match).length;
  const existentes = rows.filter(r=>r.match).length;
  let html = `<div class="step-label">Vista previa — ${existentes} para actualizar, ${nuevos} nuevos</div>
  <div class="preview-wrap" style="max-height:200px;"><table><thead><tr>
    <th></th><th>Código</th><th>Rubro</th><th>Descripción</th><th>Precio</th><th>UM</th><th>Estado</th>
  </tr></thead><tbody>`;
  rows.forEach((r,idx)=>{
    html += `<tr>
      <td><input type="checkbox" ${r.incluir?'checked':''} onchange="importCtx.rows[${idx}].incluir=this.checked"></td>
      <td class="mono">${r.codigo?esc(r.codigo):'—'}</td>
      <td>${r.rubro?esc(r.rubro):'—'}</td>
      <td>${esc(r.nombre)}</td>
      <td class="price">${money(r.venta)}</td>
      <td>${r.um?esc(r.um):'—'}</td>
      <td>${r.match ? '<span class="badge good">actualiza</span>' : '<span class="badge new">nuevo</span>'}</td>
    </tr>`;
  });
  html += `</tbody></table></div>
  <div class="modal-actions">
    <button class="btn secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn" onclick="confirmarImport()">Confirmar importación</button>
  </div>`;
  div.innerHTML = html;
}

async function confirmarImport(){
  const prParaBackup = proveedores.find(x=>x.id===importCtx.proveedorId);
  // Guardar un respaldo del estado actual de ESTE proveedor antes de aplicar los cambios de esta importación
  if(prParaBackup){
    try{
      let backups = (await fbGet('backupsPorProveedor')) || {};
      backups[prParaBackup.id] = {
        productos: productos.filter(p=>p.proveedorId===prParaBackup.id).map(p=>({...p})),
        proveedor: {...prParaBackup}
      };
      await fbSet('backupsPorProveedor', backups);
    }catch(e){ /* si falla el respaldo, igual seguimos con la importación */ }
  }

  const pr = proveedores.find(x=>x.id===importCtx.proveedorId);
  let actualizados = 0, creados = 0;
  for(const r of importCtx.rows){
    if(!r.incluir) continue;
    if(r.match){
      r.match.precioLista = isNaN(r.precioParsed) ? r.match.precioLista : r.precioParsed;
      r.match.costo = r.costoNeto;
      const ventaVieja = r.match.venta;
      r.match.venta = r.venta;
      r.match.ventaAnterior = ventaVieja;
      r.match.proveedor = pr.nombre;
      r.match.proveedorId = pr.id;
      if(r.codigo) r.match.codigo = r.codigo;
      if(r.rubro) r.match.categoria = r.rubro;
      if(r.um) r.match.presentacion = r.um;
      actualizados++;
    }else{
      productos.push({
        id: uid(),
        nombre: r.nombre,
        categoria: r.rubro,
        codigo: r.codigo,
        presentacion: r.um,
        stock: 0,
        stockMin: configStockBajoDefault,
        precioLista: isNaN(r.precioParsed) ? 0 : r.precioParsed,
        costo: r.costoNeto,
        venta: r.venta,
        proveedor: pr.nombre,
        proveedorId: pr.id,
      });
      creados++;
    }
  }
  // Guardar la configuración de columnas para la próxima importación de este proveedor
  pr.importConfig = { ...importCtx.mapping, savedAt: today() };
  pr.ultimaImportacion = today();
  saveProductos();
  saveProveedores();
  closeModal();

  if(loteActivo){
    showToast(`${pr.nombre}: ${actualizados} actualizados, ${creados} nuevos`);
    loteIndex++;
    setTimeout(()=> iniciarSiguienteDelLote(), 400);
    return;
  }

  currentTab = 'stock';
  render();
  showToast(`Importación lista: ${actualizados} actualizados, ${creados} nuevos`);
}


function exportarCSV(){
  const rows = [['Nombre','Categoria','Codigo','Stock','Precio costo','Precio venta','Proveedor']];
  for(const p of productos){
    rows.push([p.nombre, p.categoria||'', p.codigo||'', p.stock||0, p.costo||0, p.venta||0, p.proveedor||'']);
  }
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'stock_ferreteria.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV descargado');
}

  btn.addEventListener('click', ()=>{
    currentTab = btn.dataset.tab;
    render();
  });
});
