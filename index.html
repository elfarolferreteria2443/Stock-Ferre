<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferretería — Stock, Pedidos y Proveedores</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg: #eceae4;
    --panel: #ffffff;
    --ink: #23262b;
    --ink-soft: #63676e;
    --line: #d8d5cc;
    --accent: #cf4f0e;
    --accent-ink: #ffffff;
    --accent2: #2c5f7c;
    --good: #3f7a52;
    --good-bg: #e6f0e8;
    --warn: #a8710a;
    --warn-bg: #fbecd0;
    --danger: #b3261e;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(35,38,43,0.06), 0 4px 14px rgba(35,38,43,0.05);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:ui-monospace, 'Consolas', 'Liberation Mono', monospace; }
  header.app-header{
    background:var(--ink);
    color:#fff;
    padding:12px 20px 0 20px;
    position:sticky; top:0; z-index:30;
  }
  .stats-mini{ display:flex; gap:18px; font-size:12.5px; color:#c9cbce; padding-bottom:12px; flex-wrap:wrap; }
  .stats-mini b{ color:#fff; font-weight:700; }
  nav.tabs{ display:flex; gap:4px; margin-top:14px; overflow-x:auto; }
  nav.tabs button{
    flex:1;
    background:transparent;
    border:none;
    color:#b9bbbf;
    padding:12px 8px 14px 8px;
    font-family:ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-weight:700;
    font-size:16px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    cursor:pointer;
    border-bottom:3px solid transparent;
    transition:color .15s, border-color .15s;
    white-space:nowrap;
  }
  nav.tabs button:hover{ color:#fff; }
  nav.tabs button.active{ color:#fff; border-bottom-color:var(--accent); }

  main{ max-width:1440px; margin:0 auto; padding:20px 16px 80px 16px; }

  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
  .toolbar input[type="text"], .toolbar select{
    padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    background:var(--panel); font-size:14px; font-family:inherit; color:var(--ink);
  }
  .toolbar input[type="text"]{ flex:1; min-width:160px; }
  .toolbar select{ width:220px; flex-shrink:0; }
  .spacer{ flex:1; }
  .search-wrap{ flex:1; min-width:200px; display:flex; align-items:center; gap:6px; }
  .search-wrap input[type="text"]{ flex:1; min-width:0; }
  .search-wrap .icon-btn{ width:26px; height:26px; font-size:13px; flex-shrink:0; }

  .stock-layout{ display:flex; gap:16px; align-items:flex-start; width:100%; }
  .stock-main{ flex:1 1 0%; min-width:0; }
  .table-scroll{ overflow:auto; max-width:100%; max-height:58vh; border-radius:var(--radius); }
  .price-detail{
    width:220px; flex-shrink:0; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; box-shadow:var(--shadow);
  }
  .pd-title{ font-family:ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; font-weight:700; font-size:17px; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pd-price-big{ font-family:ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; font-weight:800; font-size:46px; color:var(--accent); margin-bottom:12px; line-height:1; }
  .pd-breakdown{ margin-top:12px; }
  .pd-row{ display:flex; justify-content:space-between; gap:10px; padding:7px 0; border-bottom:1px dashed var(--line); font-size:13.5px; }
  .pd-row:last-child{ border-bottom:none; }
  .pd-row.total{ font-weight:700; border-bottom:1px solid var(--line); }
  .pd-empty{ color:var(--ink-soft); font-size:13.5px; text-align:center; padding:30px 6px; }
  @media (max-width:800px){
    .stock-layout{ flex-direction:column; }
    .price-detail{ width:100%; }
  }

  button.btn, a.btn, label.btn{
    background:var(--accent); color:var(--accent-ink); border:none; border-radius:8px;
    padding:10px 16px; font-weight:700; font-size:14px; cursor:pointer; font-family:inherit;
    white-space:nowrap; display:inline-block; text-decoration:none; box-sizing:border-box;
  }
  button.btn:hover, a.btn:hover, label.btn:hover{ filter:brightness(1.06); }
  button.btn:disabled{ opacity:0.45; cursor:not-allowed; }
  button.btn.secondary, a.btn.secondary, label.btn.secondary{ background:var(--panel); color:var(--ink); border:1px solid var(--line); }
  button.btn.ghost, a.btn.ghost{ background:transparent; color:var(--accent2); border:1px solid transparent; padding:8px 10px; }
  button.btn.danger, a.btn.danger{ background:transparent; color:var(--danger); border:1px solid #e3b7b3; }
  a.btn-whatsapp{ background:#25D366; color:#fff; }
  a.btn-whatsapp:hover{ filter:brightness(1.05); }
  button.btn-mail-celeste, a.btn-mail-celeste{ background:#1a73e8; color:#fff; }
  button.btn-mail-celeste:hover, a.btn-mail-celeste:hover{ filter:brightness(1.05); }
  button.btn-yellow{ background:#f0c419; color:#3a2e00; }
  button.btn-yellow:hover{ filter:brightness(1.05); }
  button.btn.small, a.btn.small{ padding:6px 10px; font-size:13px; }
  button.icon-btn{
    width:27px; height:27px; border-radius:7px; border:1px solid var(--line); background:#fff;
    cursor:pointer; font-size:13.5px; line-height:1; display:inline-flex; align-items:center; justify-content:center;
  }
  button.icon-btn:hover{ background:#f2f0ea; }
  button.icon-btn.small{ width:22px; height:22px; font-size:12px; }
  #refreshBtn{ transition:transform .4s ease; }

  .dash-toggle{
    display:inline-block; font-size:12.5px; font-weight:700; color:var(--ink-soft); cursor:pointer;
    padding:6px 2px; user-select:none;
  }
  .dash-toggle:hover{ color:var(--ink); }
  .dash{ display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:10px; margin:6px 0 18px 0; }
  .dash .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px; box-shadow:var(--shadow);
  }
  .dash .card .num{ font-family:ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; font-size:28px; font-weight:800; }
  .dash .card .lbl{ font-size:12.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.03em; }
  .dash .card.warn .num{ color:var(--warn); }

  table{ width:100%; border-collapse:collapse; background:var(--panel); border-radius:var(--radius); box-shadow:var(--shadow); }
  table.resizable{ table-layout:fixed; overflow:visible; }
  thead th{
    text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft);
    padding:8px 12px; border-bottom:1px solid var(--line); font-weight:700;
    position:sticky; top:0; background:var(--panel); z-index:2;
  }
  th.th-sort{ cursor:pointer; user-select:none; transition:background .1s ease, color .1s ease; }
  th.th-sort:hover{ background:var(--bg); color:#1a73e8; }
  tbody tr{ height:38px; }
  tbody td{ padding:6px 10px; border-bottom:1px solid #eeece5; font-size:12.5px; vertical-align:middle; overflow:hidden; }
  .cell-trunc{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-transform:uppercase; }
  .cell-wrap{ white-space:nowrap; overflow:visible; text-transform:uppercase; }
  .col-resizer{
    position:absolute; right:0; top:0; width:7px; height:100%; cursor:col-resize; z-index:5; user-select:none;
  }
  .col-resizer::after{
    content:""; position:absolute; right:2px; top:15%; width:2px; height:70%; background:var(--line); border-radius:1px;
  }
  .col-resizer:hover::after{ background:var(--accent); width:3px; }
  tbody tr:last-child td{ border-bottom:none; }
  table.resizable tbody tr:nth-child(odd){ background:#eaf4f8; }
  table.resizable tbody tr:nth-child(even){ background:#ffffff; }
  tbody tr:hover{ background:#faf9f5; }
  table.resizable tbody tr:hover{ background:#f7ecd9; }
  .prod-name{ font-weight:600; }
  .prod-cat{ font-size:12px; color:var(--ink-soft); }
  .badge{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:12px; font-weight:700; }
  .badge.good{ background:var(--good-bg); color:var(--good); }
  .badge.warn{ background:var(--warn-bg); color:var(--warn); }
  .badge.new{ background:#e8eef5; color:var(--accent2); }
  .badge.sent{ background:#e8eef5; color:var(--accent2); }
  .stock-adjust{ display:flex; align-items:center; gap:3px; flex-wrap:nowrap; }
  .stock-adjust input{
    width:38px; text-align:center; padding:5px 2px; border:1px solid var(--line); border-radius:6px;
    font-family:ui-monospace, 'Consolas', 'Liberation Mono', monospace; font-weight:600; font-size:12px;
  }
  .price{ font-family:ui-monospace, 'Consolas', 'Liberation Mono', monospace; font-weight:600; }
  .row-actions{ display:flex; gap:6px; justify-content:flex-end; flex-wrap:nowrap; }

  .empty{
    text-align:center; padding:60px 20px; color:var(--ink-soft); background:var(--panel);
    border-radius:var(--radius); border:1px dashed var(--line);
  }
  .empty .big{ font-family:ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; font-size:22px; color:var(--ink); font-weight:700; margin-bottom:6px; }

  /* Modal */
  .overlay{
    position:fixed; inset:0; background:rgba(35,38,43,0.5); display:flex; align-items:flex-start;
    justify-content:center; padding:30px 14px; z-index:100; overflow-y:auto;
  }
  .modal{
    background:var(--panel); border-radius:12px; width:100%; max-width:480px; padding:22px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
  }
  .modal.wide{ max-width:960px; }
  .field-row-import{ display:flex; gap:8px; flex-wrap:nowrap; overflow-x:auto; padding-bottom:2px; }
  .import-layout{ display:flex; gap:20px; align-items:flex-start; }
  .import-col-left{ flex:1.3; min-width:0; }
  .import-col-right{ width:260px; flex-shrink:0; }
  .import-col-right .field{ margin-bottom:10px; }
  @media (max-width:720px){
    .import-layout{ flex-direction:column; }
    .import-col-right{ width:100%; }
  }
  .field-row-import .field{ flex:1; min-width:95px; }
  .modal h3{ font-family:ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; font-size:22px; margin:0 0 4px 0; text-transform:uppercase; letter-spacing:0.02em; }
  .modal .subtitle{ font-size:13px; color:var(--ink-soft); margin-bottom:16px; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; }
  .field input, .field select, .field textarea{
    width:100%; padding:10px 11px; border:1px solid var(--line); border-radius:8px; font-family:inherit; font-size:14.5px;
  }
  .field-row{ display:flex; gap:10px; flex-wrap:wrap; }
  .field-row .field{ flex:1; min-width:120px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; flex-wrap:wrap; }
  .checkbox-field{ display:flex; align-items:center; gap:8px; margin-bottom:14px; font-size:14px; }
  .checkbox-field input{ width:auto; }
  .step-label{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; color:var(--accent2); margin:16px 0 8px 0; }
  .step-label:first-child{ margin-top:0; }

  /* Pedidos */
  .pedido-card{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:12px; box-shadow:var(--shadow); overflow:hidden; }
  .pedido-head{ display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; flex-wrap:wrap; }
  .pedido-head .prov{ font-weight:700; font-size:15.5px; }
  .pedido-head .meta{ font-size:12.5px; color:var(--ink-soft); }
  .pedido-body{ padding:0 16px 16px 16px; border-top:1px solid #eeece5; }
  .pedido-body table{ box-shadow:none; }
  .pedido-body tbody tr{ height:26px; }
  .pedido-body tbody td{ padding:2px 8px; font-size:12px; }
  .pedido-body thead th{ padding:5px 8px; font-size:11px; }
  .pedido-body tbody td input[type="number"]{ padding:2px 6px !important; font-size:12px; }
  .item-row-add{ display:flex; gap:8px; align-items:flex-end; margin-bottom:10px; flex-wrap:wrap; }
  .item-row-add .field{ margin-bottom:0; }
  .pedido-items-list{ list-style:none; padding:0; margin:0 0 12px 0; }
  .pedido-items-list li{ display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed var(--line); font-size:14px; }
  .pedido-items-list li:last-child{ border-bottom:none; }

  /* Proveedores */
  .global-pct-row{ display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .global-pct-box{ background:#e3f2fa; border:1px solid #a9d7ec; border-radius:10px; padding:9px 16px; }
  .global-pct-box label{ display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:0.04em; color:#1d6a8c; font-weight:700; margin-bottom:3px; }
  .global-pct-note{ font-size:12px; color:var(--ink-soft); flex:1; min-width:200px; }

  /* Métricas */
  .metric-card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px 18px;
    margin-bottom:12px; box-shadow:var(--shadow);
  }
  .metric-card-tight{ padding:9px 14px; margin-bottom:7px; }
  .metric-card-tight .metric-name{ font-size:15px; }
  .metric-card-tight .metric-comprado{ font-size:13.5px; }
  .metric-head{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .metric-name{ font-family:ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; font-weight:700; font-size:19px; text-transform:uppercase; letter-spacing:0.02em; }
  .metric-comprado{ font-family:ui-monospace, 'Consolas', 'Liberation Mono', monospace; font-weight:600; font-size:16px; color:var(--accent); }
  .metric-bar-wrap{ background:var(--bg); border-radius:6px; height:6px; margin:8px 0 12px 0; overflow:hidden; }
  .metric-bar{ background:var(--accent); height:100%; border-radius:6px; }
  .metric-stats{ display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:8px 18px; }
  .metric-stat{ display:flex; justify-content:space-between; gap:8px; font-size:13px; padding:4px 0; border-bottom:1px dashed var(--line); }
  .metric-stat:last-child{ border-bottom:none; }
  .metric-stat-lbl{ color:var(--ink-soft); }
  .metric-stat-val{ font-family:ui-monospace, 'Consolas', 'Liberation Mono', monospace; font-weight:600; text-align:right; }
  .prov-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; align-items:start; }
  @media (max-width:800px){ .prov-grid{ grid-template-columns:1fr; } }
  .prov-card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:11px 16px;
    box-shadow:var(--shadow); min-width:0;
  }
  .prov-card-head{ cursor:pointer; user-select:none; }
  .prov-card-head:hover .name{ color:#1a73e8; }
  .prov-info .name{ font-weight:700; font-size:15px; margin-bottom:2px; }
  .prov-info .meta{ font-size:11.5px; color:var(--ink-soft); }
  .prov-card-head .name{ font-weight:700; font-size:15px; margin-bottom:2px; }
  .prov-card-head .meta{ font-size:11.5px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .prov-pct{ display:flex; gap:16px; margin:4px 0; }
  .prov-pct-edit{ display:flex; gap:20px; flex-wrap:wrap; margin:5px 0; }
  .pct-group label{ display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft); font-weight:700; margin-bottom:2px; }
  .pct-inputs{ display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
  .pct-item{ display:flex; align-items:center; gap:2px; }
  .pct-item input{
    width:48px; padding:3px 4px; border:1px solid var(--line); border-radius:6px; text-align:center;
    font-family:ui-monospace, 'Consolas', 'Liberation Mono', monospace; font-weight:600; font-size:12.5px;
  }
  .pct-plus{ color:var(--ink-soft); font-weight:700; margin:0 2px; }
  .prov-pct .pct{ font-family:ui-monospace, 'Consolas', 'Liberation Mono', monospace; font-size:13.5px; }
  .prov-pct .pct b{ color:var(--accent); }
  .preview-wrap{ max-height:320px; overflow-y:auto; border:1px solid var(--line); border-radius:8px; margin-bottom:14px; }
  .file-grid-wrap{ overflow-x:auto; overflow-y:hidden; border:1px solid var(--line); border-radius:8px; margin-bottom:14px; }
  .file-grid{ box-shadow:none; }
  .file-grid th, .file-grid td{ padding:3px 7px; font-size:11px; white-space:nowrap; }
  .preview-wrap table{ box-shadow:none; }
  .preview-wrap thead th{ position:sticky; top:0; background:#fff; }

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:11px 18px; border-radius:8px; font-size:14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.25); opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:200;
    max-width:90vw; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

  @media (max-width:600px){
    .brand{ font-size:22px; }
    nav.tabs button{ font-size:13.5px; padding:10px 4px 12px 4px; }
    thead{ display:none; }
    table, tbody, tr, td{ display:block; width:100%; }
    tbody tr{ border-bottom:1px solid var(--line); padding:10px 12px; }
    tbody td{ border:none; padding:4px 0; display:flex; justify-content:space-between; align-items:center; }
    tbody td::before{ content:attr(data-label); font-size:11px; color:var(--ink-soft); text-transform:uppercase; font-weight:700; }
    .row-actions{ justify-content:flex-start; margin-top:6px; }
    .preview-wrap thead{ display:table-header-group; }
    .preview-wrap table, .preview-wrap tbody, .preview-wrap tr, .preview-wrap td{ display:table-cell; width:auto; }
    .preview-wrap tr{ display:table-row; }
    .file-grid-wrap thead{ display:table-header-group; }
    .file-grid-wrap table, .file-grid-wrap tbody, .file-grid-wrap tr, .file-grid-wrap td{ display:table-cell; width:auto; }
    .file-grid-wrap tr{ display:table-row; }
  }

  @media print{
    header.app-header, .toolbar, .row-actions, .dash, .btn{ display:none !important; }
    body{ background:#fff; }
  }
</style>
</head>
<body>

<div id="loginGate" style="position:fixed; inset:0; z-index:100; background:var(--ink); display:flex; align-items:center; justify-content:center; padding:20px;">
  <div style="background:var(--panel); border-radius:var(--radius); box-shadow:var(--shadow); padding:32px 28px; max-width:360px; width:100%; text-align:center;">
    <div style="font-size:20px; font-weight:700; margin-bottom:6px;">Ferretería</div>
    <div style="color:var(--ink-soft); font-size:13.5px; margin-bottom:22px;">Iniciá sesión con tu cuenta de Google para entrar.</div>
    <button class="btn" style="width:100%;" onclick="iniciarSesionGoogle()">Iniciar sesión con Google</button>
    <div id="loginError" style="color:var(--danger); font-size:12.5px; margin-top:14px;"></div>
  </div>
</div>

<div id="appRoot" style="display:none;">
<header class="app-header">
  <div style="display:flex; align-items:center; gap:8px;">
    <nav class="tabs" style="flex:1;">
      <button data-tab="stock" class="active">Stock</button>
      <button data-tab="pedidos">Pedidos</button>
      <button data-tab="proveedores">Proveedores</button>
      <button data-tab="metricas">Métricas</button>
      <button data-tab="cuentas">Cuentas corrientes</button>
    </nav>
    <button class="icon-btn" id="logoutBtn" title="Cerrar sesión" onclick="cerrarSesion()" style="margin-bottom:8px; background:transparent; border-color:#565a60; color:#fff;">⎋</button>
    <button class="icon-btn" id="refreshBtn" title="Traer los últimos datos guardados" onclick="manualRefresh()" style="margin-bottom:8px; background:transparent; border-color:#565a60; color:#fff;">⟳</button>
    <button class="icon-btn" id="settingsBtn" title="Configuración" onclick="openConfiguracionModal()" style="margin-bottom:8px; background:transparent; border-color:#565a60; color:#fff;">⚙</button>
  </div>
</header>

<main id="main"></main>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ---------------- Estado ---------------- */
let productos = [];
let pedidos = [];
let proveedores = [];
let cuentasMovimientos = [];
let currentTab = 'stock';
let searchStock = '';
let searchPedidos = '';
let stockSortColumn = null;
let stockSortDir = 'asc';
let filterCat = '';
let selectedProductId = null;

async function fbGet(key){
  const token = await getAuthToken();
  const url = `${FIREBASE_URL}/${key}.json` + (token ? `?auth=${token}` : '');
  const res = await fetch(url);
  if(!res.ok) throw new Error('Firebase GET falló: ' + res.status);
  return await res.json();
}
async function fbSet(key, value){
  const token = await getAuthToken();
  const url = `${FIREBASE_URL}/${key}.json` + (token ? `?auth=${token}` : '');
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(value)
  });
  if(!res.ok) throw new Error('Firebase PUT falló: ' + res.status);
}

/* ---------------- Integración con Gmail (buscar listas de precios) ---------------- */
let gmailAccessToken = null;

/* Pide el permiso de Gmail con Google Identity Services (independiente del login de Firebase).
   Evita el problema de signInWithRedirect al pedir un permiso extra estando ya logueado, que
   no siempre devuelve el token de acceso. */
function reconectarGmail(proveedorId){
  if(!window.google || !google.accounts || !google.accounts.oauth2){
    showToast('Todavía está cargando el sistema de Google. Esperá un segundo y probá de nuevo.');
    return;
  }
  showToast('Confirmá el permiso de Gmail en la ventana que se abrió...');
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_OAUTH_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/gmail.readonly',
    hint: configCuentaGmail || undefined,
    callback: (tokenResponse) => {
      if(tokenResponse && tokenResponse.access_token){
        gmailAccessToken = tokenResponse.access_token;
        showToast('Gmail conectado, buscando...');
        if(proveedorId) buscarListaGmail(proveedorId);
      }else{
        showToast('No se pudo obtener el permiso de Gmail.');
      }
    },
    error_callback: (err) => {
      showToast('No se pudo conectar con Gmail: ' + (err && err.type ? err.type : 'error desconocido'));
    }
  });
  client.requestAccessToken({ prompt: 'consent' });
}

async function gmailFetch(url){
  if(!gmailAccessToken){ const err = new Error('SIN_TOKEN'); err.code = 'SIN_TOKEN'; throw err; }
  const res = await fetch(url, { headers: { Authorization: `Bearer ${gmailAccessToken}` } });
  if(res.status === 401){ const err = new Error('TOKEN_VENCIDO'); err.code = 'TOKEN_VENCIDO'; throw err; }
  if(!res.ok) throw new Error('Gmail respondió ' + res.status);
  return await res.json();
}

function extraerAdjuntosDeMensaje(msg){
  const out = [];
  function recorrer(part){
    if(!part) return;
    if(part.filename && part.body && part.body.attachmentId && /\.(xlsx|xls|csv)$/i.test(part.filename)){
      out.push({ filename: part.filename, attachmentId: part.body.attachmentId });
    }
    if(part.parts) part.parts.forEach(recorrer);
  }
  recorrer(msg.payload);
  return out;
}

async function buscarListaGmail(proveedorId){
  const pr = proveedores.find(x=>x.id===proveedorId);
  if(!pr) return;
  if(!pr.mail){ showToast('Este proveedor no tiene un mail cargado. Agregalo con el botón ✎ Editar.'); return; }
  if(!gmailAccessToken){
    reconectarGmail(proveedorId);
    return;
  }
  showToast('Buscando en Gmail...');
  try{
    const q = encodeURIComponent(`from:(${pr.mail}) has:attachment (filename:xlsx OR filename:xls OR filename:csv)`);
    const data = await gmailFetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages?q=${q}&maxResults=15`);
    const msgs = data.messages || [];
    if(msgs.length === 0){ showToast('No encontré mails de ' + pr.mail + ' con una lista adjunta.'); return; }
    const detalles = [];
    for(const m of msgs){
      const full = await gmailFetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=full`);
      const adjuntos = extraerAdjuntosDeMensaje(full);
      if(adjuntos.length){
        const headers = full.payload.headers || [];
        const asunto = (headers.find(h=>h.name==='Subject')||{}).value || '(sin asunto)';
        const fecha = (headers.find(h=>h.name==='Date')||{}).value || '';
        detalles.push({ msgId: m.id, asunto, fecha, adjuntos });
      }
    }
    if(detalles.length === 0){ showToast('Encontré mails de ese proveedor pero ninguno con un Excel o CSV adjunto.'); return; }
    mostrarModalResultadosGmail(pr, detalles);
  }catch(e){
    if(e.code === 'TOKEN_VENCIDO' || e.code === 'SIN_TOKEN'){
      reconectarGmail(proveedorId);
    }else{
      showToast('Error buscando en Gmail: ' + e.message);
    }
  }
}

async function importarAdjuntoGmail(proveedorId, msgId, attachmentId){
  try{
    showToast('Descargando archivo de Gmail...');
    const data = await gmailFetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msgId}/attachments/${attachmentId}`);
    const b64 = (data.data || '').replace(/-/g,'+').replace(/_/g,'/');
    const binario = atob(b64);
    const bytes = new Uint8Array(binario.length);
    for(let i=0;i<binario.length;i++) bytes[i] = binario.charCodeAt(i);
    const blob = new Blob([bytes]);
    openImportModal(proveedorId);
    await cargarArchivoEnContexto(blob);
  }catch(e){
    showToast('No se pudo descargar el adjunto: ' + e.message);
  }
}

async function volverListaAnteriorProveedor(prId){
  const pr = proveedores.find(x=>x.id===prId);
  if(!pr) return;
  if(!confirm(`¿Volver a la lista de precios anterior de "${pr.nombre}"? Esto reemplaza sus productos actuales por como estaban antes de la última importación de este proveedor. No afecta a los demás proveedores.`)) return;

  let backups = {};
  try{ backups = (await fbGet('backupsPorProveedor')) || {}; }catch(e){}
  const backup = backups[prId];
  if(!backup){
    showToast('Todavía no hay una actualización anterior guardada para este proveedor.');
    return;
  }

  // Guardamos el estado actual de este proveedor como el nuevo "anterior",
  // para poder ir y volver tocando el botón de nuevo.
  const productosActuales = productos.filter(p => p.proveedorId === prId).map(p => ({...p}));
  const proveedorActual = { ...pr };

  productos = productos.filter(p => p.proveedorId !== prId);
  productos.push(...(backup.productos || []));
  if(backup.proveedor) Object.assign(pr, backup.proveedor);

  backups[prId] = { productos: productosActuales, proveedor: proveedorActual };
  try{ await fbSet('backupsPorProveedor', backups); }catch(e){}

  await saveProductos();
  await saveProveedores();
  render();
  showToast(`Se volvió a la lista anterior de ${pr.nombre}`);
}

}

/* Parsea precios en formato argentino ("1.250,50", "1250,50", "1250.50", "$ 1250") */
function parsePrecioAR(raw){
  if(raw == null) return NaN;
  let s = String(raw).trim().replace(/\$/g,'').replace(/\s/g,'');
  if(s === '') return NaN;
  const hasComma = s.includes(',');
  const hasDot = s.includes('.');
  if(hasComma && hasDot){
    s = s.replace(/\./g,'').replace(',', '.');
  }else if(hasComma){
    s = s.replace(',', '.');
  }else if(hasDot){
    const parts = s.split('.');
    const last = parts[parts.length-1];
    if(parts.length > 2 || last.length === 3){
      s = parts.join('');
    }
  }
  const n = Number(s);
  return isNaN(n) ? NaN : n;
}

/* ---- Descuentos y ganancias múltiples (en cascada) por proveedor ---- */
function getDescuentos(pr){
  if(!pr) return [0];
  if(Array.isArray(pr.descuentos) && pr.descuentos.length) return pr.descuentos;
  if(typeof pr.descuento === 'number') return [pr.descuento];
  return [0];
}
function getGanancias(pr){
  if(!pr) return [0];
  if(Array.isArray(pr.ganancias) && pr.ganancias.length) return pr.ganancias;
  if(typeof pr.ganancia === 'number') return [pr.ganancia];
  return [0];
}
function aplicarDescuentos(precio, descuentos){
  let v = Number(precio)||0;
  for(const d of (descuentos||[])) v = v * (1 - (Number(d)||0)/100);
  return v;
}
function aplicarGanancias(costo, ganancias){
  let v = Number(costo)||0;
  for(const g of (ganancias||[])) v = v * (1 + (Number(g)||0)/100);
  return v;
}
function aplicarGlobales(venta){
  let v = Number(venta)||0;
  v = v * (1 + (Number(globalPctIva)||0)/100);
  v = v * (1 + (Number(globalPctTarjeta)||0)/100);
  return v;
}
function redondearPrecio(v){
  const step = Number(configRedondeoStep) || 1;
  return Math.ceil((Number(v)||0) / step) * step;
}

function formatPctList(arr){
  const vals = (arr||[]).map(v=>Number(v)||0);
  if(vals.length === 0) return '0%';
  return vals.map(v=>`${v}%`).join(' + ');
}
function recalcularPreciosProveedor(pr){
  let actualizados = 0;
  const descuentos = getDescuentos(pr);
  const ganancias = getGanancias(pr);
  for(const p of productos){
    if(p.proveedorId === pr.id && Number(p.precioLista) > 0){
      const costoNeto = aplicarDescuentos(p.precioLista, descuentos);
      const venta = redondearPrecio(aplicarGlobales(aplicarGanancias(costoNeto, ganancias)));
      const ventaVieja = p.venta;
      p.costo = costoNeto;
      p.venta = venta;
      p.ventaAnterior = ventaVieja;
      actualizados++;
    }
  }
  return actualizados;
}
function recalcularTodosLosPrecios(){
  let actualizados = 0;
  for(const p of productos){
    if(p.proveedorId && Number(p.precioLista) > 0){
      const pr = proveedores.find(x=>x.id===p.proveedorId);
      if(!pr) continue;
      const costoNeto = aplicarDescuentos(p.precioLista, getDescuentos(pr));
      const venta = redondearPrecio(aplicarGlobales(aplicarGanancias(costoNeto, getGanancias(pr))));
      const ventaVieja = p.venta;
      p.costo = costoNeto;
      p.venta = venta;
      p.ventaAnterior = ventaVieja;
      actualizados++;
    }
  }
  return actualizados;
}
function updateGlobalPct(field, value){
  const v = Number(value)||0;
  if(field==='tarjeta') globalPctTarjeta = v; else globalPctIva = v;
  saveGlobalPct();
  const n = recalcularTodosLosPrecios();
  saveProductos();
  render();

}

function getPedidoIndicator(productId){
  const relevantes = pedidos.filter(ped => ped.estado === 'pendiente' && ped.items.some(it => it.productId === productId));
  if(relevantes.length === 0) return null;
  const rank = { amarillo: 3, naranja: 2, rojo: 1 };
  let mejor = null;
  for(const ped of relevantes){
    const tieneParcial = (ped.notas || '').includes('Recepción parcial');
    let estado;
    if(tieneParcial) estado = 'amarillo';
    else if(ped.enviado) estado = 'naranja';
    else estado = 'rojo';
    if(!mejor || rank[estado] > rank[mejor]) mejor = estado;
  }
  return mejor;
}

function sortStockColumn(col){
  if(stockSortColumn === col){
    stockSortDir = stockSortDir === 'asc' ? 'desc' : 'asc';
  }else{
    stockSortColumn = col;
    stockSortDir = 'asc';
  }
  render();
}
function compareNatural(a, b){
  const ax = String(a).match(/(\d+|\D+)/g) || [];
  const bx = String(b).match(/(\d+|\D+)/g) || [];
  const len = Math.max(ax.length, bx.length);
  for(let i=0;i<len;i++){
    const as = ax[i] || '';
    const bs = bx[i] || '';
    const an = /^\d+$/.test(as), bn = /^\d+$/.test(bs);
    if(an && bn){
      const diff = parseInt(as,10) - parseInt(bs,10);
      if(diff !== 0) return diff;
    }else{
      const cmp = as.toLowerCase().localeCompare(bs.toLowerCase());
      if(cmp !== 0) return cmp;
    }
  }
  return 0;
}
function compararStock(a, b, col, dir){
  let va, vb;
  if(col === 'costo' || col === 'stock'){
    va = Number(a[col]) || 0;
    vb = Number(b[col]) || 0;
    if(va < vb) return dir === 'asc' ? -1 : 1;
    if(va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  }
  if(col === 'codigo'){
    const cmp = compareNatural(a.codigo||'', b.codigo||'');
    return dir === 'asc' ? cmp : -cmp;
  }
  const campo = { proveedor:'proveedor', producto:'nombre', rubro:'categoria' }[col] || col;
  va = String(a[campo]||'').toLowerCase();
  vb = String(b[campo]||'').toLowerCase();
  const cmp = va.localeCompare(vb);
  return dir === 'asc' ? cmp : -cmp;
}
function flechaOrden(col){
  if(stockSortColumn !== col) return '';
  return stockSortDir === 'asc' ? ' ▲' : ' ▼';
}

function startColResize(e, key){
  e.preventDefault();
  e.stopPropagation();
  const col = document.querySelector(`col[data-col="${key}"]`);
  if(!col) return;
  const startX = e.clientX;
  const startWidth = parseInt(col.style.width, 10) || 100;
  function onMove(ev){
    const delta = ev.clientX - startX;
    let newWidth = Math.max(40, startWidth + delta);
    if(key === 'producto') newWidth = Math.min(newWidth, PRODUCTO_MAX_WIDTH);
    col.style.width = newWidth + 'px';
    colWidths[key] = newWidth;
  }
  function onUp(){
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    saveColWidths();
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function renderPriceDetail(){
  const p = productos.find(x=>x.id===selectedProductId);
  if(!p){
    return `<div class="price-detail"><div class="pd-title">Precio</div>
      <div class="pd-empty">Tocá un producto de la lista para ver su precio.</div></div>`;
  }
  const proveedor = proveedores.find(pr=>pr.id===p.proveedorId);
  const descuentoPct = proveedor ? formatPctList(getDescuentos(proveedor)) : null;
  const gananciaPct = proveedor ? formatPctList(getGanancias(proveedor)) : null;
  const precioLista = Number(p.precioLista) || Number(p.costo) || 0;
  const costo = Number(p.costo) || 0;
  const venta = Number(p.venta) || 0;
  const descuentoMonto = precioLista - costo;

  // Desglose paso a paso: costo -> ganancia individual -> IVA global -> recargo tarjeta global -> venta final
  let gananciaBase = costo, ivaMonto = 0, tarjetaMonto = 0, gananciaMonto = venta - costo;
  if(proveedor){
    gananciaBase = aplicarGanancias(costo, getGanancias(proveedor));
    gananciaMonto = gananciaBase - costo;
    const conIva = gananciaBase * (1 + (Number(globalPctIva)||0)/100);
    ivaMonto = conIva - gananciaBase;
    const conTarjeta = conIva * (1 + (Number(globalPctTarjeta)||0)/100);
    tarjetaMonto = conTarjeta - conIva;
  }

  let flecha = '';
  if(typeof p.ventaAnterior === 'number' && !isNaN(p.ventaAnterior) && p.ventaAnterior !== venta){
    if(venta > p.ventaAnterior){
      flecha = `<span title="Subió respecto a la última lista (antes ${money(p.ventaAnterior)})" style="color:var(--danger); font-size:0.55em; vertical-align:middle;">▲</span>`;
    }else{
      flecha = `<span title="Bajó respecto a la última lista (antes ${money(p.ventaAnterior)})" style="color:var(--good); font-size:0.55em; vertical-align:middle;">▼</span>`;
    }
  }

  return `<div class="price-detail">
    <div class="pd-title" title="${esc(p.nombre)}">${esc(p.nombre)}</div>
    <div class="pd-price-big">${money(venta)} ${flecha}</div>
    <button class="btn secondary small" style="width:100%;" onclick="toggleDetalle()">${detalleExpandido ? 'Ocultar detalle ▴' : 'Ver detalle ▾'}</button>
    ${detalleExpandido ? `
    <div class="pd-breakdown">
      <div class="pd-row"><span>Precio de lista</span><span class="mono">${money(precioLista)}</span></div>
      <div class="pd-row"><span>Descuento${descuentoPct!=null?` (${descuentoPct})`:''}</span><span class="mono">−${money(descuentoMonto)}</span></div>
      <div class="pd-row total"><span>Costo</span><span class="mono">${money(costo)}</span></div>
      <div class="pd-row"><span>Ganancia${gananciaPct!=null?` (${gananciaPct})`:''}</span><span class="mono">+${money(gananciaMonto)}</span></div>
      ${Number(globalPctIva) ? `<div class="pd-row"><span>IVA (${globalPctIva}%)</span><span class="mono">+${money(ivaMonto)}</span></div>` : ''}
      ${Number(globalPctTarjeta) ? `<div class="pd-row"><span>Recargo tarjeta (${globalPctTarjeta}%)</span><span class="mono">+${money(tarjetaMonto)}</span></div>` : ''}
    </div>` : ''}
  </div>`;
}

function confirmarFaltante(productId){
  const p = productos.find(x=>x.id===productId);
  if(!p) return;
  let proveedorNombre = p.proveedor;
  const provInput = document.getElementById('fal_proveedor');
  if(provInput) proveedorNombre = provInput.value.trim();
  if(!proveedorNombre){ showToast('Indicá a qué proveedor pedirlo'); return; }
  const cantidad = Math.max(1, Math.round(Number(document.getElementById('fal_cantidad').value)||1));

  const provMatch = proveedores.find(pr => pr.nombre.toLowerCase() === proveedorNombre.toLowerCase());
  if(!p.proveedor){
    p.proveedor = proveedorNombre;
    if(provMatch) p.proveedorId = provMatch.id;
    saveProductos();
  }

  let ped = pedidos.find(x => x.estado === 'pendiente' && (
    (provMatch && x.proveedorId === provMatch.id) || normTxt(x.proveedor) === normTxt(proveedorNombre)
  ));
  if(!ped){
    ped = { id: uid(), proveedor: proveedorNombre, proveedorId: provMatch ? provMatch.id : null, fecha: today(), items: [], notas: '', estado: 'pendiente', enviado: false };
    pedidos.push(ped);
  }else if(provMatch && !ped.proveedorId){
    ped.proveedorId = provMatch.id;
  }
  const existing = ped.items.find(i=>i.productId===p.id);
  if(existing){
    existing.cantidad += cantidad;
    existing.fechaAgregado = today();
  }else{
    ped.items.push({ productId: p.id, nombre: p.nombre, cantidad, fechaAgregado: today() });
  }

  savePedidos();
  closeModal();
  openPedidoIds.add(ped.id);
  render();
  showToast(`Agregado al pedido de ${proveedorNombre}`);
}

      </datalist>

function closeModal(){ document.getElementById('modalRoot').innerHTML = ''; }

function saveProducto(id){
  const nombre = document.getElementById('f_nombre').value.trim();
  const venta = document.getElementById('f_venta').value;
  if(!nombre){ showToast('Poné un nombre para el producto'); return; }
  if(venta === '' || isNaN(Number(venta)) || Number(venta) < 0){ showToast('Poné un precio de venta válido (0 o mayor)'); return; }

  const provNombre = document.getElementById('f_proveedor').value.trim();
  const provMatch = proveedores.find(pr => pr.nombre.toLowerCase() === provNombre.toLowerCase());

  const data = {
    nombre,
    categoria: document.getElementById('f_categoria').value.trim(),
    codigo: document.getElementById('f_codigo').value.trim(),
    stock: Math.max(0, Math.round(Number(document.getElementById('f_stock').value)||0)),
    stockMin: Math.max(0, Math.round(Number(document.getElementById('f_stockmin').value)||0)),
    precioLista: Math.max(0, Number(document.getElementById('f_precioLista').value)||0),
    costo: Math.max(0, Number(document.getElementById('f_costo').value)||0),
    venta: Math.max(0, Number(venta)),
    proveedor: provNombre,
    proveedorId: provMatch ? provMatch.id : null,
    presentacion: document.getElementById('f_presentacion').value.trim(),
  };
  const ventaBajoCosto = data.venta < data.costo && data.costo > 0;

  if(id){
    const p = productos.find(x=>x.id===id);
    const ventaVieja = p.venta;
    Object.assign(p, data);
    p.ventaAnterior = ventaVieja;
  }else{
    productos.push({ id: uid(), ...data });
    currentTab = 'stock';
  }
  saveProductos();
  closeModal();
  render();
  showToast(ventaBajoCosto ? 'Guardado. Atención: el precio de venta quedó por debajo del costo.' : 'Producto guardado');
}

function renderPedidos(){
  let html = `<div class="toolbar">
    <div class="search-wrap">

  </div>

    html += `<div class="empty"><div class="big">No hay pedidos todavía</div>
      <div>Creá un pedido a tu proveedor para reponer stock.</div></div>`;
    return html;
  }

}

function renderPedidosListHtml(){
  const q = searchPedidos.trim().toLowerCase();
  let ordenados = [...pedidos].sort((a,b)=> b.fecha.localeCompare(a.fecha));
  if(q){
    ordenados = ordenados.filter(ped=>{
      const enProveedor = (ped.proveedor||'').toLowerCase().includes(q);
      const enProductos = ped.items.some(it=> (it.nombre||'').toLowerCase().includes(q));
      return enProveedor || enProductos;
    });
  }
  if(ordenados.length === 0){
    return `<div class="empty"><div class="big">No hay resultados</div><div>Probá con otra búsqueda.</div></div>`;
  }
  let html = '';
  for(const ped of ordenados){
    const abierto = openPedidoIds.has(ped.id);
    const totalItems = ped.items.reduce((a,i)=>a+Number(i.cantidad),0);
    let totalPedido = 0;
    for(const it of ped.items){
      const prod = productos.find(x=>x.id===it.productId);
      const valorUnitario = prod ? Number(prod.costo)||0 : 0;
      const cantidadPedida = Number(it.cantidad)||0;
      const subtotalItem = valorUnitario * cantidadPedida;
      totalPedido += subtotalItem;
    }
    const texto = buildPedidoText(ped);
    const provObj = ped.proveedorId
      ? proveedores.find(pr => pr.id === ped.proveedorId)
      : proveedores.find(pr => normTxt(pr.nombre) === normTxt(ped.proveedor));
    const telLimpio = provObj && provObj.whatsapp ? String(provObj.whatsapp).replace(/[^0-9]/g,'') : '';
    const linkWhatsapp = buildWhatsappLink(telLimpio, texto);
    const linkMail = 'mailto:?subject=' + encodeURIComponent(`Pedido a ${ped.proveedor || ''}`) + '&body=' + encodeURIComponent(texto);
    const est = estadoPedido(ped);
    html += `<div class="pedido-card">
      <div class="pedido-head" style="display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap;">
        <div style="flex:1; min-width:160px; cursor:pointer;" onclick="togglePedido('${ped.id}')">
          <div class="prov">${esc(ped.proveedor || 'Sin proveedor')}</div>
          <div class="meta">${ped.fecha} · ${ped.items.length} producto(s) · ${totalItems} unidades · <b class="mono" style="color:var(--ink);">${money(totalPedido, 2)}</b></div>
        </div>
        <div class="row-actions" onclick="event.stopPropagation()">
          <a class="btn small btn-whatsapp" href="${linkWhatsapp}" target="_blank" rel="noopener" onclick="marcarPedidoEnviado('${ped.id}', true)" title="${telLimpio ? 'Abre la conversación con ' + esc(provObj.nombre) : 'No hay WhatsApp cargado para este proveedor: vas a elegir el contacto a mano'}">Enviar por WhatsApp</a>
          <a class="btn small btn-mail-celeste" href="${linkMail}" onclick="marcarPedidoEnviado('${ped.id}', true)">Enviar por mail</a>
        </div>
        <span class="badge ${est.clase}" onclick="event.stopPropagation(); togglePedido('${ped.id}')" style="cursor:pointer;">${est.label}</span>
      </div>
      ${abierto ? renderPedidoBody(ped) : ''}
    </div>`;
  }
  return html;
}

function renderPedidosList(){
  const wrap = document.getElementById('pedidosListWrap');
  if(wrap){
    wrap.innerHTML = renderPedidosListHtml();
    const input = document.getElementById('pedidos_search_input');
    if(input){ input.focus(); const len = input.value.length; input.setSelectionRange(len, len); }

    render();
  }
}

function togglePedido(id){
  if(openPedidoIds.has(id)) openPedidoIds.delete(id);
  else openPedidoIds.add(id);
  render();
}

function buildPedidoText(ped){
  const lineas = [];
  lineas.push(`Pedido para ${ped.proveedor || 'proveedor'}`);
  lineas.push(`Fecha: ${ped.fecha}`);
  lineas.push('');
  for(const it of ped.items){
    const prod = productos.find(x=>x.id===it.productId);
    const codigo = prod && prod.codigo ? prod.codigo : '';
    lineas.push(`- ${codigo ? codigo + ' - ' : ''}${it.nombre} x${it.cantidad}`);
  }
  if(ped.notas){ lineas.push(''); lineas.push(`Notas: ${ped.notas}`); }
  return lineas.join('\n');
}

function buildWhatsappLink(telLimpio, texto){
  const encoded = encodeURIComponent(texto);
  if(configWhatsappModo === 'escritorio'){
    return telLimpio ? `whatsapp://send?phone=${telLimpio}&text=${encoded}` : `whatsapp://send?text=${encoded}`;
  }
  return telLimpio ? `https://web.whatsapp.com/send?phone=${telLimpio}&text=${encoded}` : `https://web.whatsapp.com/send?text=${encoded}`;
}
function estadoPedido(ped){
  if(ped.estado === 'recibido') return { label:'Recibido', clase:'good' };
  if(ped.enviado) return { label:'Enviado', clase:'sent' };
  return { label:'Pendiente', clase:'warn' };
}
function marcarPedidoEnviado(pedidoId, valor){
  const ped = pedidos.find(x=>x.id===pedidoId);
  if(!ped) return;
  ped.enviado = !!valor;

  render();
}

  const codigoInput = document.getElementById('ap_codigo');
  const codigo = codigoInput.value.trim();
  if(!codigo){ showToast('Escribí un código'); return; }
  const cant = Math.max(1, Math.round(Number(document.getElementById('ap_cantidad').value)||1));

  if(!p){ showToast('No se encontró ningún producto con ese código'); return; }
  const existing = agregarPedidoItemsTemp.find(i=>i.productId===p.id);
  if(existing) existing.cantidad += cant;

function renderApItemsList(){

  ).join('') || '<li style="color:#63676e;">Todavía no agregaste productos</li>';

function removeApItem(idx){

function guardarAgregarProductosPedido(){
  if(agregarPedidoItemsTemp.length === 0){ showToast('Agregá al menos un producto'); return; }
  const ped = pedidos.find(x=>x.id===agregarPedidoIdActual);
  if(!ped) return;
  for(const it of agregarPedidoItemsTemp){
    const existing = ped.items.find(i=>i.productId===it.productId);
    if(existing){
      existing.cantidad += it.cantidad;
      existing.fechaAgregado = today();
    }else{
      ped.items.push({ productId: it.productId, nombre: it.nombre, cantidad: it.cantidad, fechaAgregado: today() });
    }
  }
  savePedidos();
  closeModal();
  render();
  showToast('Productos agregados al pedido');
}

function updatePedidoItemCantidad(pedidoId, productId, value){
  const ped = pedidos.find(x=>x.id===pedidoId);
  if(!ped) return;
  const item = ped.items.find(i=>i.productId===productId);
  if(!item) return;
  item.cantidad = Math.max(1, Math.round(Number(value))||1);
  savePedidos();
  render();
}

function removePedidoItem(pedidoId, productId){
  const ped = pedidos.find(x=>x.id===pedidoId);
  if(!ped) return;
  ped.items = ped.items.filter(i=>i.productId!==productId);
  if(ped.items.length === 0){
    pedidos = pedidos.filter(x=>x.id!==pedidoId);
    if(openPedidoIds.has(pedidoId)) openPedidoIds.delete(pedidoId);
    showToast('Pedido eliminado (no quedaban productos)');
  }
  savePedidos();
  render();
}

async function handleFacturaFoto(input){
  const file = input.files[0];
  if(!file) return;
  if(!configAnthropicApiKey){
    showToast('Configurá tu clave de API de Anthropic en Configuración (⚙) para usar esta función.');
    input.value = '';
    return;
  }
  const ped = pedidos.find(x=>x.id===recepcionPedidoId);
  const statusEl = document.getElementById('rec_foto_status');
  if(statusEl) statusEl.innerHTML = `<div class="meta">Leyendo la factura…</div>`;
  try{
    const base64 = await new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result).split(',')[1]);
      reader.onerror = () => reject(new Error('No se pudo leer la imagen'));
      reader.readAsDataURL(file);
    });
    const mediaType = file.type || 'image/jpeg';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': configAnthropicApiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-5',
        max_tokens: 1200,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
            { type: 'text', text: 'Sos un asistente que lee facturas o remitos argentinos de mercadería entregada. Mirá la imagen y devolvé SOLO un JSON válido, sin texto adicional, sin comillas invertidas y sin la palabra json antes: un array de objetos, uno por cada línea de producto, con esta forma exacta: [{"codigo":"ABC123","cantidad":5}]. El "codigo" es el valor de la columna CODIGO. La "cantidad" es el número de la columna CANT (cantidad), como número. Si no podés leer con claridad el código o la cantidad de una línea, no la incluyas en el resultado.' }
          ]
        }]
      })
    });
    if(!response.ok){
      const errBody = await response.text().catch(()=> '');
      throw new Error(`Anthropic API respondió ${response.status}: ${errBody.slice(0,200)}`);
    }
    const data = await response.json();
    const textBlock = (data.content || []).map(b => b.text || '').join('\n');
    const clean = textBlock.replace(/```json|```/g, '').trim();
    const items = JSON.parse(clean);

    let matched = 0;
    const rows = document.querySelectorAll('#rec_items_body tr');
    for(const it of items){
      const codigoLeido = normTxt(it.codigo);
      if(!codigoLeido) continue;
      const cantidadLeida = Math.max(0, Math.round(Number(it.cantidad)||0));
      rows.forEach(row=>{
        const productId = row.dataset.productid;
        const prod = productos.find(p=>p.id===productId);
        if(prod && prod.codigo && normTxt(prod.codigo) === codigoLeido){
          const inp = row.querySelector('.rec-input');
          if(inp){ inp.value = cantidadLeida; matched++; }
        }
      });
    }
    const total = ped ? ped.items.length : rows.length;
    if(statusEl){
      statusEl.innerHTML = matched > 0
        ? `<div class="meta">Se completaron ${matched} de ${total} producto(s) según la foto. Revisá los números antes de confirmar.</div>`
        : `<div class="meta" style="color:var(--warn);">No se pudo emparejar ningún código con la foto. Cargá las cantidades a mano.</div>`;
    }
  }catch(err){
    if(statusEl) statusEl.innerHTML = `<div class="meta" style="color:var(--danger);">No se pudo leer la factura automáticamente (${esc(err.message||'error desconocido')}). Cargá las cantidades a mano.</div>`;
  }
}

function confirmarRecepcion(pedidoId){
  const ped = pedidos.find(x=>x.id===pedidoId);
  if(!ped) return;
  const inputs = document.querySelectorAll('.rec-input');
  const recibidos = {};
  inputs.forEach(inp=>{
    const idx = Number(inp.dataset.idx);
    recibidos[idx] = Math.max(0, Math.round(Number(inp.value)||0));
  });

  const totalItemsOriginal = ped.items.length;
  const nuevosItems = [];
  ped.items.forEach((it, idx)=>{
    const recibido = recibidos[idx] !== undefined ? recibidos[idx] : 0;
    const pedidoQty = Number(it.cantidad)||0;
    if(recibido > 0){
      const p = productos.find(x=>x.id===it.productId);
      if(p) p.stock = (Number(p.stock)||0) + recibido;
    }
    const faltante = pedidoQty - recibido;
    if(faltante > 0){
      nuevosItems.push({ ...it, cantidad: faltante });
    }
  });
  const productosFaltantes = nuevosItems.length;
  const productosLlegaron = totalItemsOriginal - productosFaltantes;

  ped.items = nuevosItems;
  if(ped.items.length === 0){
    ped.estado = 'recibido';
    ped.fechaRecibido = today();
  }else{
    ped.notas = (ped.notas ? ped.notas + ' | ' : '') + `Recepción parcial ${today()}: llegaron ${productosLlegaron} producto(s), faltan ${productosFaltantes} producto(s).`;
  }

  saveProductos();
  savePedidos();
  closeModal();
  render();
  showToast(ped.items.length === 0 ? 'Pedido recibido completo: stock actualizado' : `Recepción registrada. Quedan ${ped.items.length} producto(s) pendientes.`);
}

function deletePedido(id){
  if(!confirm('¿Eliminar este pedido?')) return;
  pedidos = pedidos.filter(x=>x.id!==id);
  openPedidoIds.delete(id);
  savePedidos();
  render();
  showToast('Pedido eliminado');
}

    return;
  }
  nuevoPedidoItems = [];
  const modal = document.getElementById('modalRoot');
  modal.innerHTML = `
  <div class="overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <h3>Nuevo pedido</h3>
      <div class="field"><label>Proveedor</label><input id="np_proveedor" list="prov_datalist" type="text" placeholder="Ej: Distribuidora Sur"></div>
      <datalist id="prov_datalist">${proveedores.map(pr=>`<option value="${esc(pr.nombre)}">`).join('')}</datalist>
      <div class="item-row-add">
        <div class="field" style="flex:2; min-width:140px;">
          <label>Producto</label>
          <select id="np_producto">
            ${productos.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(p=>`<option value="${p.id}">${esc(p.nombre)}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="max-width:90px;">
          <label>Cantidad</label>

        </div>

      </div>
      <ul class="pedido-items-list" id="np_items_list"></ul>
      <div class="field"><label>Notas</label><textarea id="np_notas" rows="2" placeholder="Opcional"></textarea></div>

        <button class="btn secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn" onclick="guardarPedido()">Guardar pedido</button>
      </div>
    </div>
  </div>`;
  renderNpItemsList();
}

function addItemToPedido(){
  const sel = document.getElementById('np_producto');
  const cant = Math.max(1, Math.round(Number(document.getElementById('np_cantidad').value)||1));
  const p = productos.find(x=>x.id === sel.value);
  if(!p) return;
  const existing = nuevoPedidoItems.find(i=>i.productId===p.id);
  if(existing) existing.cantidad += cant;
  else nuevoPedidoItems.push({ productId:p.id, nombre:p.nombre, cantidad:cant, fechaAgregado: today() });
  renderNpItemsList();
}
function renderNpItemsList(){
  const ul = document.getElementById('np_items_list');
  if(!ul) return;
  ul.innerHTML = nuevoPedidoItems.map((it,idx)=>
    `<li><span>${esc(it.nombre)}</span><span>x${it.cantidad} <button class="icon-btn" style="width:22px;height:22px;font-size:12px;margin-left:8px;" onclick="removeNpItem(${idx})">✕</button></span></li>`
  ).join('') || '<li style="color:#63676e;">Todavía no agregaste productos</li>';
}
function removeNpItem(idx){
  nuevoPedidoItems.splice(idx,1);
  renderNpItemsList();
}
function guardarPedido(){
  if(nuevoPedidoItems.length === 0){ showToast('Agregá al menos un producto al pedido'); return; }
  const proveedorNombre = document.getElementById('np_proveedor').value.trim();
  const provMatch = proveedores.find(pr => pr.nombre.toLowerCase() === proveedorNombre.toLowerCase());
  pedidos.push({
    id: uid(),
    proveedor: proveedorNombre,
    proveedorId: provMatch ? provMatch.id : null,
    fecha: today(),
    items: nuevoPedidoItems,
    notas: document.getElementById('np_notas').value.trim(),
    estado: 'pendiente',
    enviado: false
  });
  savePedidos();
  closeModal();
  render();
  showToast('Pedido guardado');
}

function updateProveedorPct(provId, field, idx, value){
  const pr = proveedores.find(x=>x.id===provId);
  if(!pr) return;
  if(!Array.isArray(pr[field])) pr[field] = field==='descuentos' ? getDescuentos(pr) : getGanancias(pr);
  pr[field][idx] = Number(value)||0;
  recalcularPreciosProveedor(pr);
  saveProveedores();
  saveProductos();
  render();
}
function addProveedorPct(provId, field){
  const pr = proveedores.find(x=>x.id===provId);
  if(!pr) return;
  if(!Array.isArray(pr[field])) pr[field] = field==='descuentos' ? getDescuentos(pr) : getGanancias(pr);
  pr[field].push(0);
  saveProveedores();
  render();
}
function removeProveedorPct(provId, field){
  const pr = proveedores.find(x=>x.id===provId);
  if(!pr) return;
  if(!Array.isArray(pr[field]) || pr[field].length<=1) return;
  pr[field].pop();
  recalcularPreciosProveedor(pr);
  saveProveedores();
  saveProductos();
  render();
}

/* ================= MÉTRICAS ================= */
function calcularMetricasProveedor(pr){
  const nombreNorm = normTxt(pr.nombre);
  const pedidosProv = pedidos.filter(p => p.proveedorId ? p.proveedorId === pr.id : normTxt(p.proveedor) === nombreNorm);
  const recibidos = pedidosProv.filter(p => p.estado === 'recibido');
  const pendientes = pedidosProv.filter(p => p.estado === 'pendiente');

  let totalComprado = 0, totalVenta = 0;
  for(const ped of recibidos){
    for(const it of ped.items){
      const prod = productos.find(x=>x.id===it.productId);
      const costoUnit = prod ? Number(prod.costo)||0 : 0;
      const ventaUnit = prod ? Number(prod.venta)||0 : 0;
      const cant = Number(it.cantidad)||0;
      totalComprado += costoUnit * cant;
      totalVenta += ventaUnit * cant;
    }
  }
  const totalGanancia = totalVenta - totalComprado;
  const margenPct = totalComprado > 0 ? (totalGanancia/totalComprado)*100 : null;

  let totalPendiente = 0;
  for(const ped of pendientes){
    for(const it of ped.items){
      const prod = productos.find(x=>x.id===it.productId);
      const costoUnit = prod ? Number(prod.costo)||0 : 0;
      totalPendiente += costoUnit * (Number(it.cantidad)||0);
    }
  }

  const productosVinculados = productos.filter(p=>p.proveedorId === pr.id);
  const valorStockActual = productosVinculados.reduce((acc,p)=> acc + (Number(p.stock)||0)*(Number(p.costo)||0), 0);
  const sinEnviar = pendientes.filter(p=>!p.enviado).length;

  return {
    pedidosTotales: pedidosProv.length,
    pedidosRecibidos: recibidos.length,
    pedidosPendientes: pendientes.length,
    pedidosSinEnviar: sinEnviar,
    totalComprado, totalVenta, totalGanancia, margenPct,
    totalPendiente,
    productosVinculados: productosVinculados.length,
    valorStockActual,
    ultimaImportacion: pr.ultimaImportacion || null,
  };
}

function mesKeyDe(fecha){ return fecha ? String(fecha).slice(0,7) : null; }
function mesAnteriorKey(mesKey){
  const [y,m] = mesKey.split('-').map(Number);
  const d = new Date(y, m-2, 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function nombreMes(mesKey){
  const [y,m] = mesKey.split('-').map(Number);
  const nombres = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return nombres[m-1] + ' ' + y;
}
function calcularTotalesPorMes(){
  const totales = {};
  for(const ped of pedidos){
    if(ped.estado !== 'recibido') continue;
    const key = mesKeyDe(ped.fechaRecibido || ped.fecha);
    if(!key) continue;
    if(!totales[key]) totales[key] = { compras:0, ventas:0 };
    for(const it of ped.items){
      const prod = productos.find(x=>x.id===it.productId);
      const costoUnit = prod ? Number(prod.costo)||0 : 0;
      const ventaUnit = prod ? Number(prod.venta)||0 : 0;
      const cant = Number(it.cantidad)||0;
      totales[key].compras += costoUnit * cant;
      totales[key].ventas += ventaUnit * cant;
    }
  }
  return totales;
}
function flechaComparativa(actual, anterior, invertirColor){
  if(anterior === 0 && actual === 0) return '';
  if(actual === anterior) return '';
  const subio = actual > anterior;
  const colorSubio = invertirColor ? 'var(--ink-soft)' : 'var(--good)';
  const colorBajo = invertirColor ? 'var(--ink-soft)' : 'var(--danger)';
  const color = subio ? colorSubio : colorBajo;
  const flecha = subio ? '▲' : '▼';
  const pct = anterior > 0 ? Math.abs(((actual-anterior)/anterior)*100).toFixed(0)+'%' : '';
  return ` <span style="color:${color}; font-size:0.6em; vertical-align:middle;" title="Respecto al mes pasado${pct?' ('+pct+')':''}">${flecha}</span>`;
}

function renderMetricas(){
  if(proveedores.length === 0){
    return `<div class="empty"><div class="big">Todavía no hay proveedores cargados</div>
      <div>Las métricas se arman a partir de los proveedores y los pedidos que vayas registrando.</div></div>`;
  }

  const datos = proveedores.map(pr => ({ pr, m: calcularMetricasProveedor(pr) }));

  const totalGeneralComprado = datos.reduce((a,d)=>a+d.m.totalComprado, 0);
  const totalGeneralGanancia = datos.reduce((a,d)=>a+d.m.totalGanancia, 0);
  const totalGeneralPendiente = datos.reduce((a,d)=>a+d.m.totalPendiente, 0);
  const margenGeneralPct = totalGeneralComprado > 0 ? (totalGeneralGanancia/totalGeneralComprado)*100 : null;

  const porMes = calcularTotalesPorMes();
  const keyActual = mesKeyDe(today());
  const keyAnterior = mesAnteriorKey(keyActual);
  const actual = porMes[keyActual] || { compras:0, ventas:0 };
  const anterior = porMes[keyAnterior] || { compras:0, ventas:0 };
  const gananciaActual = actual.ventas - actual.compras;
  const gananciaAnterior = anterior.ventas - anterior.compras;

  const sorters = {
    comprado: (a,b)=> b.m.totalComprado - a.m.totalComprado,
    ganancia: (a,b)=> b.m.totalGanancia - a.m.totalGanancia,
    margen: (a,b)=> (b.m.margenPct??-Infinity) - (a.m.margenPct??-Infinity),
    pedidos: (a,b)=> b.m.pedidosTotales - a.m.pedidosTotales,
  };
  datos.sort(sorters[metricasSortBy] || sorters.comprado);

  const maxComprado = Math.max(1, ...datos.map(d=>d.m.totalComprado));

  let html = `
  <div class="dash-toggle" onclick="toggleMetricasResumen()">${metricasResumenVisible ? '▾' : '▸'} Resumen general</div>
  ${metricasResumenVisible ? `
  <div class="dash">
    <div class="card"><div class="num mono">${money(totalGeneralComprado)}</div><div class="lbl">Comprado total (histórico)</div></div>
    <div class="card"><div class="num mono">${money(totalGeneralGanancia)}</div><div class="lbl">Ganancia generada (histórico)</div></div>
    <div class="card"><div class="num">${margenGeneralPct!=null ? margenGeneralPct.toFixed(1)+'%' : '—'}</div><div class="lbl">Margen promedio</div></div>
    <div class="card warn"><div class="num mono">${money(totalGeneralPendiente)}</div><div class="lbl">En pedidos pendientes</div></div>
  </div>
  <div class="step-label">Este mes (${nombreMes(keyActual)}) vs. ${nombreMes(keyAnterior)}</div>
  <div class="dash" style="margin-bottom:18px;">
    <div class="card"><div class="num mono">${money(actual.compras)}${flechaComparativa(actual.compras, anterior.compras, true)}</div><div class="lbl">Compras este mes</div></div>
    <div class="card"><div class="num mono">${money(actual.ventas)}${flechaComparativa(actual.ventas, anterior.ventas, false)}</div><div class="lbl">Ventas este mes</div></div>
    <div class="card"><div class="num mono">${money(gananciaActual)}${flechaComparativa(gananciaActual, gananciaAnterior, false)}</div><div class="lbl">Ganancia este mes</div></div>
  </div>` : ''}
  <div class="toolbar">
    <div class="spacer"></div>
    <select onchange="metricasSortBy=this.value; render()">
      <option value="comprado" ${metricasSortBy==='comprado'?'selected':''}>Ordenar por: Total comprado</option>
      <option value="ganancia" ${metricasSortBy==='ganancia'?'selected':''}>Ordenar por: Ganancia generada</option>
      <option value="margen" ${metricasSortBy==='margen'?'selected':''}>Ordenar por: Margen %</option>
      <option value="pedidos" ${metricasSortBy==='pedidos'?'selected':''}>Ordenar por: Cantidad de pedidos</option>
    </select>
  </div>`;

  for(const {pr, m} of datos){
    const barPct = Math.round((m.totalComprado / maxComprado) * 100);
    const expandida = metricasExpandidas.has(pr.id);
    html += `<div class="metric-card">
      <div class="metric-head" style="cursor:pointer;" onclick="toggleMetricaCard('${pr.id}')">
        <div class="metric-name">${expandida ? '▾' : '▸'} ${esc(pr.nombre)}</div>
        <div class="metric-comprado">${money(m.totalComprado)}</div>
      </div>
      <div class="metric-bar-wrap"><div class="metric-bar" style="width:${barPct}%;"></div></div>
      ${expandida ? `
      <div class="metric-stats">
        <div class="metric-stat"><span class="metric-stat-lbl">Ganancia generada</span><span class="metric-stat-val" style="color:var(--good);">${money(m.totalGanancia)}</span></div>
        <div class="metric-stat"><span class="metric-stat-lbl">Margen</span><span class="metric-stat-val">${m.margenPct!=null ? m.margenPct.toFixed(1)+'%' : '—'}</span></div>
        <div class="metric-stat"><span class="metric-stat-lbl">Pedidos</span><span class="metric-stat-val">${m.pedidosRecibidos} recibidos · ${m.pedidosPendientes} pendientes${m.pedidosSinEnviar>0 ? ` (${m.pedidosSinEnviar} sin enviar)`:''}</span></div>
        <div class="metric-stat"><span class="metric-stat-lbl">En pedidos pendientes</span><span class="metric-stat-val" style="color:var(--warn);">${money(m.totalPendiente)}</span></div>
        <div class="metric-stat"><span class="metric-stat-lbl">Productos vinculados</span><span class="metric-stat-val">${m.productosVinculados}</span></div>
        <div class="metric-stat"><span class="metric-stat-lbl">Valor de su stock actual</span><span class="metric-stat-val">${money(m.valorStockActual)}</span></div>
        <div class="metric-stat"><span class="metric-stat-lbl">Última lista importada</span><span class="metric-stat-val">${m.ultimaImportacion || '—'}</span></div>
      </div>` : ''}
    </div>`;
  }
  return html;
}

  const fecha = document.getElementById('mov_fecha').value || today();
  const nota = document.getElementById('mov_nota').value.trim();
  cuentasMovimientos.push({ id: uid(), proveedorId: prId, tipo, monto, fecha, nota, facturaFecha: tipo==='cargo' ? fecha : '', notaExtra: '' });

  cuentasExpandidas.add(prId);

function updateMovimientoNumeroFactura(movId, value){
  const m = cuentasMovimientos.find(x=>x.id===movId);

  m.nota = value;
  saveCuentas();
}

function ajustarFechaFactura(movId, delta){
  const m = cuentasMovimientos.find(x=>x.id===movId);
  if(!m) return;
  const base = m.facturaFecha || m.fecha;
  const d = new Date(base + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  m.facturaFecha = d.toISOString().slice(0,10);
  saveCuentas();
  render();
}

function updateMovimientoNota(movId, value){
  const m = cuentasMovimientos.find(x=>x.id===movId);
  if(!m) return;
  m.notaExtra = value;
  saveCuentas();
}

  cuentasMovimientos = cuentasMovimientos.filter(m=>m.id!==movId);

  render();
  showToast('Movimiento eliminado');
}

function changeImportSheet(sheetName){
  importCtx.sheetName = sheetName;
  importCtx.allRows = extractRows(importCtx.workbook, sheetName);
  importCtx.startRow = importCtx.allRows.length > 1 ? 2 : 1;
  importCtx.rows = null;
  renderImportMapping();
}

function extractRows(wb, sheetName){
  const sheet = wb.Sheets[sheetName];
  return XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
}

async function cargarArchivoEnContexto(file){
  if(!file) return;
  const esPdf = (file.type === 'application/pdf') || /\.pdf$/i.test(file.name || '');
  if(esPdf){
    await procesarPdfConIA(file);
    return;
  }
  try{
    const buf = await file.arrayBuffer();
    const data = new Uint8Array(buf);
    const wb = XLSX.read(data, {type:'array'});
    const primeraHoja = wb.SheetNames[0];
    const rows = extractRows(wb, primeraHoja);
    if(!rows || rows.length < 1){
      showToast('No se encontraron filas en el archivo');
      return;
    }
    importCtx.workbook = wb;
    importCtx.sheetName = primeraHoja;
    importCtx.allRows = rows;
    const pr = proveedores.find(x=>x.id===importCtx.proveedorId);
    importCtx.startRow = (pr && pr.importConfig && pr.importConfig.startRow) ? pr.importConfig.startRow : (rows.length > 1 ? 2 : 1);
    renderImportMapping();
  }catch(err){
    showToast('No se pudo leer el archivo. Probá exportarlo como CSV.');
  }
}

function handleImportFile(input){
  const file = input.files[0];
  cargarArchivoEnContexto(file);
}

/* Lee una lista de precios en PDF usando Claude (Anthropic), ya que un PDF no tiene
   columnas fijas como un Excel. Devuelve directamente las filas a la vista previa de
   importación, sin pasar por el paso de mapeo de columnas. */
async function procesarPdfConIA(file){
  if(!configAnthropicApiKey){
    showToast('Configurá tu clave de API de Anthropic en Configuración (⚙) para leer listas en PDF.');
    return;
  }
  const div = document.getElementById('im_mapping');
  if(div) div.innerHTML = `<div class="step-label">Leyendo el PDF con IA, puede tardar unos segundos...</div>`;
  try{
    const base64 = await new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result).split(',')[1]);
      reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
      reader.readAsDataURL(file);
    });
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': configAnthropicApiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-5',
        max_tokens: 8000,
        messages: [{
          role: 'user',
          content: [
            { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } },
            { type: 'text', text: 'Sos un asistente que lee listas de precios de proveedores de ferretería en PDF. Mirá el documento completo (todas las páginas) y devolvé SOLO un JSON válido, sin texto adicional, sin comillas invertidas y sin la palabra json antes: un array de objetos, uno por cada producto, con esta forma exacta: [{"codigo":"ABC123","rubro":"Tornillos","descripcion":"Tornillo autoperforante 6x1","precio":123.45,"um":"UN"}]. "codigo" es el código o SKU si existe (si no hay, dejalo vacío). "rubro" es la categoría o rubro si existe (si no, vacío). "descripcion" es el nombre del producto. "precio" es el precio de lista en pesos, como número (sin el símbolo $, con punto decimal, sin separador de miles). "um" es la unidad de medida si existe (si no, vacío). Incluí todas las filas de productos que encuentres, de todas las páginas.' }
          ]
        }]
      })
    });
    if(!response.ok){
      const errBody = await response.text().catch(()=> '');
      throw new Error(`Anthropic API respondió ${response.status}: ${errBody.slice(0,200)}`);
    }
    const data = await response.json();
    const textBlock = (data.content || []).map(b => b.text || '').join('\n');
    const clean = textBlock.replace(/```json|```/g, '').trim();
    const items = JSON.parse(clean);
    if(!Array.isArray(items) || items.length === 0){
      showToast('No se encontraron productos en el PDF.');
      if(div) div.innerHTML = '';
      return;
    }
    aplicarFilasDesdeIA(items);
  }catch(err){
    showToast('No se pudo leer el PDF automáticamente: ' + (err.message||'error desconocido'));
    if(div) div.innerHTML = `<div class="global-pct-note" style="color:var(--danger);">No se pudo leer el PDF. Probá con otro archivo o cargalo como Excel/CSV.</div>`;
  }
}

function aplicarFilasDesdeIA(items){
  const pr = proveedores.find(x=>x.id===importCtx.proveedorId);
  const rows = items.map(it=>{
    const nombre = String(it.descripcion||'').trim();
    const codigo = String(it.codigo||'').trim();
    const rubro = String(it.rubro||'').trim();
    const um = String(it.um||'').trim();
    const precioParsed = Number(it.precio);
    let match = null;
    if(codigo){ match = productos.find(p => p.codigo && normTxt(p.codigo) === normTxt(codigo)); }
    if(!match && nombre){ match = productos.find(p => normTxt(p.nombre) === normTxt(nombre)); }
    const costoNeto = isNaN(precioParsed) ? 0 : aplicarDescuentos(precioParsed, getDescuentos(pr));
    const venta = redondearPrecio(aplicarGlobales(aplicarGanancias(costoNeto, getGanancias(pr))));
    return { nombre, codigo, rubro, um, precioParsed, costoNeto, venta, match, incluir: !isNaN(precioParsed) && nombre !== '' };
  }).filter(r => r.nombre !== '');

  if(rows.length === 0){ showToast('No se pudieron interpretar productos válidos del PDF.'); return; }

  importCtx.rows = rows;
  importCtx.mapping = null; // no aplica mapeo de columnas para PDFs leídos con IA
  const div = document.getElementById('im_mapping');
  if(div){
    div.innerHTML = `<div id="im_preview"></div>`;
    renderImportPreview();
  }
}
